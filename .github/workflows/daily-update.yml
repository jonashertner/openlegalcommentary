name: Daily Update

on:
  schedule:
    # Run at 02:00 CET (01:00 UTC in summer, 02:00 UTC in winter)
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENCASELAW_MCP_URL: ${{ secrets.OPENCASELAW_MCP_URL }}
        run: uv run python -m agents.pipeline daily

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet content/; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          git commit -m "chore: daily content update $(date -u +%Y-%m-%d)"
          git push
