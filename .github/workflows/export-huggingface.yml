name: Export to HuggingFace

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Install HuggingFace Hub
        run: uv pip install huggingface-hub

      - name: Export dataset
        run: uv run python -m export.huggingface

      - name: Push to HuggingFace
        if: ${{ secrets.HF_TOKEN != '' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python -c "
          import os
          token = os.environ.get('HF_TOKEN', '')
          if not token:
              print('HF_TOKEN is empty, skipping upload')
              raise SystemExit(0)
          from huggingface_hub import HfApi
          api = HfApi(token=token)
          api.upload_folder(
              folder_path='export/output',
              repo_id='openlegalcommentary/swiss-law-commentary',
              repo_type='dataset',
          )
          "
